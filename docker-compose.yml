# =========================================================
# AIGC Marketing Platform - 本地开发基础设施
# 启动: docker compose up -d
# 停止: docker compose down
# 重置: docker compose down -v && rm -rf docker-data/
# =========================================================

services:

  # -------- PostgreSQL：业务主数据库 --------
  postgres:
    image: postgres:16-alpine
    container_name: aigc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aigc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aigc_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aigc}
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data

  # -------- Redis：Celery 队列 + 缓存 --------
  redis:
    image: redis:7-alpine
    container_name: aigc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]

  # -------- Qdrant：向量数据库（RAG，P2 起使用） --------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aigc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - ./docker-data/qdrant:/qdrant/storage

  # -------- MinIO：对象存储（S3 兼容） --------
  minio:
    image: minio/minio:latest
    container_name: aigc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    volumes:
      - ./docker-data/minio:/data
    command: server /data --console-address ":9001"
